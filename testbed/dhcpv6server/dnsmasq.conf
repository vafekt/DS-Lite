# ================================================================
# DNS-Server namespace – dnsmasq
# IPv6 address: 2001:db8:cafe::2 (ISP network)
#
# Roles
#   • Authoritative resolver for dslite.example.com (A / AAAA / MX / TXT)
#   • Authoritative resolver for in-addr.arpa and ip6.arpa (PTR)
#   • Closed lab — no Internet egress: queries OUTSIDE our authoritative
#     zones return NXDOMAIN cleanly (rcode 3, RFC 1035), NOT REFUSED.
#   • Sets the AD (Authenticated Data) bit on responses so DNSSEC-
#     validating stub resolvers (systemd-resolved, libc) accept the
#     answers without "unacceptable non-authenticated data" warnings.
# ================================================================

interface=eth-isp
bind-interfaces
no-resolv

# ── Authoritative scope (closed lab — no upstream forwarder) ────────
# `local=` marks a domain as locally-served: dnsmasq answers from its
# own `address=`/`mx-host=`/`txt-record=` records and returns NXDOMAIN
# (rcode 3, RFC 1035) for unknown names in that domain — instead of
# trying to forward upstream and timing out into REFUSED. With
# `no-resolv` and no `server=` line, the resolver is authoritative-
# only for dslite.example.com; queries for any other zone return
# REFUSED, which is RFC-correct for a non-recursive nameserver in a
# closed lab.
local=/dslite.example.com/
local=/in-addr.arpa/
local=/ip6.arpa/
domain-needed
bogus-priv

# ── Zone: dslite.example.com  (forward AND reverse) ────────────────
# `host-record=NAME,IP` is the dnsmasq idiom that registers BOTH the
# forward A/AAAA record AND the matching PTR record. With this in
# place, a `ping server.dslite.example.com` from a client triggers a
# forward A and a reverse PTR — and both resolve cleanly with NOERROR,
# instead of the reverse query returning NXDOMAIN.
# Each IP's reverse-PTR will resolve to the FIRST name listed below.
host-record=aftr.dslite.example.com,2001:db8:cafe::10
# Rogue AFTR FQDN for T14 hijack demonstrations.
# Resolves to a known address on the ISP segment so the victim B4's hook
# can complete its tunnel rebuild, making the hijack observable.
host-record=aftr-rogue.dslite.example.com,2001:db8:cafe::13a
host-record=server.dslite.example.com,198.51.100.2
host-record=www.dslite.example.com,198.51.100.2
host-record=mail.dslite.example.com,198.51.100.2
host-record=ns.dslite.example.com,2001:db8:cafe::2
host-record=client1.dslite.example.com,10.0.1.100
host-record=client2.dslite.example.com,10.0.2.100
host-record=b4-1.dslite.example.com,10.0.1.1
host-record=b4-2.dslite.example.com,10.0.2.1

# ── TXT records (SPF, verification tokens, amplification targets) ────
txt-record=dslite.example.com,"v=spf1 ip4:198.51.100.0/24 ip6:2001:db8:cafe::/64 include:mail.dslite.example.com ~all"
txt-record=dslite.example.com,"MS=ms1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789AABBCCDDEEFF"
txt-record=_dmarc.dslite.example.com,"v=DMARC1; p=quarantine; rua=mailto:dmarc@dslite.example.com; ruf=mailto:forensic@dslite.example.com; fo=1; aspf=r; adkim=r; pct=100"
txt-record=_domainkey.dslite.example.com,"v=DKIM1; k=rsa; p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDIhyyfF5RWaEEDnOLSUkFSaHY1examplekeydata0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ+/=="
txt-record=amplify.dslite.example.com,"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

# ── MX records ───────────────────────────────────────────────────────
mx-host=dslite.example.com,mail.dslite.example.com,10
mx-host=dslite.example.com,mail2.dslite.example.com,20
mx-host=dslite.example.com,mail3.dslite.example.com,30

# ── EDNS: allow up to 4 096-byte responses ───────────────────────────
edns-packet-max=4096

# ── Disable DHCP (handled by ISC dhcpd) ──────────────────────────────
no-dhcp-interface=eth-isp
