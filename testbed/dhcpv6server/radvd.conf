interface eth-isp {
    AdvSendAdvert on;
    MinRtrAdvInterval 3;
    MaxRtrAdvInterval 10;
    AdvManagedFlag on;
    AdvOtherConfigFlag on;

    prefix 2001:db8:cafe::/64 {
        AdvOnLink on;
        AdvAutonomous on;
        AdvPreferredLifetime 600;
        AdvValidLifetime 1200;
    };

    # DNS server lives in its own netns now (split from dhcpv6server) — ::2
    RDNSS 2001:db8:cafe::2 {
        # RFC 8106 §5.1 — AdvRDNSSLifetime SHOULD be in
        #   [MaxRtrAdvInterval .. 2 * MaxRtrAdvInterval] = [10 .. 20] s here.
        AdvRDNSSLifetime 20;
    };
};
