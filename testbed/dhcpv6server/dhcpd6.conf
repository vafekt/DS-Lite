# ISC DHCPv6 server – provides addresses + AFTR FQDN (option 64, RFC 6334)
default-lease-time 300;
preferred-lifetime 240;
max-lease-time 300;

option dhcp6.name-servers 2001:db8:cafe::2;
option dhcp6.domain-search "dslite.example.com";

# DS-Lite AFTR-Name option (RFC 6334, option 64)
# Encoded as DNS wire format: length-prefixed labels per RFC 3315 §8
option dhcp6.aftr-name code 64 = domain-list;

subnet6 2001:db8:cafe::/64 {
    range6 2001:db8:cafe::100 2001:db8:cafe::1ff;
    option dhcp6.aftr-name "aftr.dslite.example.com.";
}
