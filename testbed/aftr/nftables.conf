#!/usr/sbin/nft -f
# ================================================================
# DS-Lite AFTR NAT44 / CGNAT
# ================================================================
#
# RFC-conformant carrier-grade NAT for the AFTR namespace.
# See RFC-COMPLIANCE.md for the full per-REQ audit.
#
# Multiplex mode: SHARED (all subscribers SNAT to 192.0.2.1).
# Per-subscriber attribution is by outer-IPv6-source (RFC 6333 §6.6
# softwire identifier), propagated through conntrack via the mark
# field set in the ip6 mangle prerouting hook.
#
# Per-subscriber connection cap (RFC 6888 §5 REQ-4): 2000 concurrent
# bindings per softwire (ct mark). The value 2000 is an
# implementation choice.
#
# Port allocation: nftables `random` flag — a per-(source, dest)
# hash. This is the closest available approximation to RFC 4787 §4.1
# REQ-1 Endpoint-Independent Mapping on Linux nftables. Strict EIM
# would require keeping per-internal-endpoint port state across
# destinations; the kernel does not implement that natively. We use
# `random` rather than `fully-random` because the latter allocates a
# new port for every conntrack entry, which is incompatible with EIM.
# This trade-off is documented in the paper §III.B.
#
# Filtering: Address-and-Port-Dependent (RFC 4787 §5 REQ-8, the
# stricter of the two filtering behaviours permitted by REQ-8). More
# restrictive than the EIF that RFC 6888 §5 REQ-7 RECOMMENDS; chosen
# to drop unsolicited inbound under shared IPv4.
#
# Traceability: via traceability_logger.py (RFC 6888 §4);
# destinations off by default per REQ-12 (opt-in via LOG_DESTINATIONS=1).
# ================================================================

flush ruleset

# ──────────────────────────────────────────────────────────────
# NAT — shared public-IPv4 pool 192.0.2.1
# ──────────────────────────────────────────────────────────────

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        jump pcp_dnat
    }

    chain pcp_dnat {
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Shared pool. All decapsulated traffic egressing via eth-wan
        # is SNATed to 192.0.2.1 with `random` port allocation in the
        # 1024-65535 ephemeral range (RFC 6056 §3.2 / §3.3).
        meta l4proto tcp oif "eth-wan" snat to 192.0.2.1:1024-65535 random
        meta l4proto udp oif "eth-wan" snat to 192.0.2.1:1024-65535 random
        oif "eth-wan" snat to 192.0.2.1
    }
}

# ──────────────────────────────────────────────────────────────
# Softwire-ID tracking (RFC 6333 §6.6)
#   Stage 1: ip6 mangle captures the low 32 bits of the outer IPv6
#            source address into the packet mark.
#   Stage 2: ip mangle copies the mark to ct mark on decapsulation,
#            so post-NAT rules can attribute back to a softwire.
# Notes: 32-bit truncation is adequate when B4 IPv6 addresses are
# allocated without collision in the low 32 bits (the testbed
# assigns sequential SLAAC interface IDs).
# ──────────────────────────────────────────────────────────────

table ip6 mangle {
    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;
        ip6 nexthdr 4 meta mark set @nh,160,32
    }
}

table ip mangle {
    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;
        # Propagate the outer-IPv6-source-derived mark from the
        # ip6 mangle stage into ct mark. The conntrack mark is now
        # the per-subscriber discriminator for downstream rules.
        meta mark != 0 ct mark set meta mark
        # Reply path: restore the per-softwire mark from ct mark so the
        # de-NAT'd reply (whose destination is an overlapping private
        # IPv4) can be policy-routed back to the correct softwire via the
        # per-B4 route tables (set up in setup.sh). Harmless for the
        # default non-overlapping subscriber /24s (they sit in the main
        # routing table and the per-B4 table lookup falls through).
        iifname "eth-wan" ct mark != 0 meta mark set ct mark
    }
}

# ──────────────────────────────────────────────────────────────
# RFC 6333 §6.6 extended binding — per-softwire conntrack ZONE.
#   The Softwire-ID *mark* above only attributes flows; it does NOT
#   make the conntrack tuple unique, so two subscribers reusing the
#   same private IPv4+port would collide. A directional (original-
#   direction-only) conntrack zone keyed on the inbound softwire makes
#   those overlapping inner tuples DISTINCT conntrack entries — exactly
#   "the NAT binding table … is extended to include the source IPv6
#   address … to disambiguate … overlapping IPv4 address space"
#   (RFC 6333 §6.6). The zone is original-only so replies — which carry
#   the globally-unique public IP:port — still match in zone 0 when they
#   arrive on eth-wan, and are de-NAT'd without an RST.
#   Priority `raw` runs before conntrack (priority -200) so the zone is
#   established before the lookup/insert.
# ──────────────────────────────────────────────────────────────
table ip dslite_zone {
    chain prerouting {
        type filter hook prerouting priority raw; policy accept;
        iifname "ds-lite-b4-1" ct original zone set 1
        iifname "ds-lite-b4-2" ct original zone set 2
    }
}

# ──────────────────────────────────────────────────────────────
# Forward chain — per-subscriber connection cap (RFC 6888 REQ-4)
# ──────────────────────────────────────────────────────────────

table ip filter {
    chain forward {
        type filter hook forward priority filter; policy drop;

        ct state invalid counter drop
        ct state established,related accept

        # Per-subscriber connection limit, keyed on ct mark (= outer
        # IPv6 source low 32). 2000 concurrent bindings per softwire.
        # This is the only data-plane defence applied by default.
        oif "eth-wan" ct state new \
            meter per_b4_connlimit { ct mark ct count over 2000 } \
            log prefix "AFTR-CONNLIMIT: " counter drop

        # Accept established outbound NAT traffic.
        oif "eth-wan" ct state new \
            log prefix "AFTR-NAT-NEW: " counter accept

        # Inbound: only DNATted (PCP-mapped) flows allowed.
        iif "eth-wan" ct state new ct status dnat \
            log prefix "AFTR-DNAT-FWD: " counter accept

        iif "eth-wan" ct state new \
            log prefix "AFTR-DROP-UNSOLICITED: " counter drop

        counter
    }
}

# ──────────────────────────────────────────────────────────────
# IPv6 fragment handling
#   No rate limit applied by default. The threat-model baseline
#   (paper §III.B) treats fragment-storm mitigation as a prospective
#   defence; including a fake accept-only meter would misrepresent
#   the undefended baseline.
# ──────────────────────────────────────────────────────────────

table ip6 filter {
    chain input {
        type filter hook input priority filter; policy accept;
        ip6 nexthdr 44 counter
    }
}
